name: Replit Pinger 24/7
on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Allows manual start

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to keep the action alive
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ping script
        env:
          REPLIT_URL: ${{ secrets.REPLIT_URL }}
        run: |
          pip install requests
          python ping.py

      - name: Keep Workflow Alive
        uses: gautamkrishnar/keepalive-workflow@v2 # Prevents 60-day shutdown
