name: Replit Pinger 24/7
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run ping script
        env:
          REPLIT_URL: ${{ secrets.REPLIT_URL }}
        run: |
          pip install requests
          python Ping.py
